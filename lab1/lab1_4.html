<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Простые числа</title>
</head>
<body>
    n: <input type="number" id="primeN">
    <button onclick="findPrimes()">Найти</button>
    <div id="primeResult"></div>

    <script>
        function findPrimes() {
            let n = parseInt(document.getElementById('primeN').value);
            let primes = [];

            nextPrime:
            for (let i = 2; i <= n; i++) {
                for (let j = 2; j < i; j++) {
                    if (i % j === 0) continue nextPrime;
                }
                primes.push(i);
            }
            document.getElementById('primeResult').innerHTML = "Простые числа: " + primes.join(', ');
        }
    </script>
</body>
</html>
